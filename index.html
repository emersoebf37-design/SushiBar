<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Sushi Bar</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#000;
  color:white;
  display:flex;
  min-height:100vh;
  overflow:hidden;
}

/* ========================= */
/* SIDEBAR DESKTOP */
/* ========================= */

.sidebar{

  width:270px;

  background:#6b0505;

  padding:30px 20px;

  display:flex;

  flex-direction:column;

  justify-content:space-between;

  position:sticky;

  top:0;

  height:100vh;

  overflow-y:auto;
}

.logo{
  font-size:42px;
  font-weight:bold;
  margin-bottom:40px;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.menu-item{

  background:transparent;

  border:none;

  color:white;

  display:flex;

  align-items:center;

  gap:12px;

  font-size:18px;

  padding:14px;

  border-radius:14px;

  cursor:pointer;

  transition:0.2s;
}

.menu-item:hover{
  background:rgba(255,255,255,0.1);
}

.sidebar-total{

  margin-top:30px;

  background:rgba(255,255,255,0.1);

  padding:20px;

  border-radius:20px;
}

.sidebar-total h2{
  font-size:36px;
  margin-top:10px;
}

.sidebar-total button{

  margin-top:20px;

  width:100%;

  padding:14px;

  border:none;

  border-radius:14px;

  background:white;

  color:black;

  font-weight:bold;

  cursor:pointer;
}

/* ========================= */
/* MAIN */
/* ========================= */

.main{

  flex:1;

  overflow-y:auto;

  height:100vh;

  padding:30px;
}

.mobile-topbar{
  display:none;
}

.mobile-menu{
  display:none;
}

@media(max-width:900px){


    .mobile-topbar{

    display:flex;

    justify-content:center;

    align-items:center;

    position:fixed;

    bottom:0;

    left:0;

    width:100%;

    background:#6b0505;

    padding:12px 10px;

    z-index:9999;

    border-top:1px solid rgba(255,255,255,0.1);
    }

    .mobile-menu{

    width:100%;

    display:flex;

    justify-content:space-around;

    align-items:center;

    gap:10px;
    }

    .mobile-menu button{

    flex:1;

    background:transparent;

    color:white;

    border:none;

    padding:14px 8px;

    border-radius:12px;

    font-size:14px;

    cursor:pointer;

    transition:0.2s;
    }

    .mobile-menu button:hover{

    background:rgba(255,255,255,0.1);
    }

  .main{

    padding-bottom:110px;
  }
}

/* ========================= */
/* RECOMMENDATIONS */
/* ========================= */

.recommendations{

  background:#7c0d0d;

  padding:25px;

  border-radius:25px;

  margin-bottom:25px;
}

.recommendations h2{
  font-size:36px;
  margin-bottom:20px;
}

.recommendation-list{

  display:flex;

  gap:20px;

  overflow-x:auto;

  overflow-y:hidden;

  padding-bottom:10px;

  scroll-behavior:smooth;
}

/* SCROLLBAR */

.recommendation-list::-webkit-scrollbar{
  height:8px;
}

.recommendation-list::-webkit-scrollbar-thumb{

  background:rgba(255,255,255,0.3);

  border-radius:20px;
}

/* CARDS FIXOS */

.recommendation-card{

  min-width:320px;

  flex-shrink:0;

  background:white;

  color:black;

  border-radius:18px;

  padding:15px;

  display:flex;

  gap:15px;

  align-items:center;
}

.recommendation-card img{

  width:70px;

  height:70px;

  object-fit:cover;

  border-radius:14px;
}

/* ========================= */
/* MENU CONTAINER */
/* ========================= */

.menu-container{

  background:#f6f6f6;

  color:black;

  border-radius:25px;

  padding:30px;
}

/* ========================= */
/* CATEGORIES */
/* ========================= */

.categories{

  display:flex;

  gap:15px;

  overflow-x:auto;

  padding-bottom:10px;

  margin-bottom:30px;
}

.categories::-webkit-scrollbar{
  height:6px;
}

.category-card{

  min-width:120px;

  background:#ececec;

  border:none;

  border-radius:18px;

  padding:20px;

  cursor:pointer;

  transition:0.2s;
}

.category-card:hover{
  transform:translateY(-3px);
}

.category-icon{

  display:flex;
  justify-content:center;
  align-items:center;

  margin-bottom:10px;
}

.category-icon img{

  width:52px;
  height:52px;

  object-fit:contain;

  transition:0.25s;
}

.category-card:hover .category-icon img{

  transform:
  scale(1.08)
  rotate(-4deg);

}

.category-name{
  font-size:16px;
}

/* ========================= */
/* PRODUCTS */
/* ========================= */

.products{

  display:grid;

  grid-template-columns:repeat(3,1fr);

  gap:25px;

  padding-right:0;

}

.products::-webkit-scrollbar{
  width:8px;
}

.products::-webkit-scrollbar-thumb{
  background:#ccc;
  border-radius:20px;
}

.product-card{

  background:white;

  border-radius:25px;

  overflow:hidden;

  display:flex;

  flex-direction:column;

  min-height:450px;
}

.product-card img{

  width:100%;

  height:240px;

  object-fit:cover;
}

.product-content{

  padding:20px;

  display:flex;

  flex-direction:column;

  flex:1;
}

.product-content h3{
  font-size:30px;
  margin-bottom:10px;
}

.product-content p{

  color:#555;

  flex:1;

  margin-bottom:15px;
}

.price{

  font-size:28px;

  font-weight:bold;
}

.add-cart-btn{

  margin-top:20px;

  border:none;

  background:#9e0505;

  color:white;

  padding:15px;

  border-radius:14px;

  cursor:pointer;

  font-size:16px;
}

/* ========================= */
/* CART */
/* ========================= */

.cart-container{

  background:white;

  color:black;

  padding:25px;

  border-radius:25px;

  margin-bottom:30px;
}

.cart-container h2{
  margin-bottom:20px;
}

#cart-items{

  display:flex;

  flex-wrap:wrap;

  gap:15px;
}

.cart-item{

  background:#f3f3f3;

  padding:15px;

  border-radius:15px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  flex:1;

  min-width:250px;
}

.trash-btn{

  background:#b30000;

  border:none;

  color:white;

  width:45px;

  height:45px;

  border-radius:12px;

  cursor:pointer;
}

.finish-order-btn{

  margin-top:20px;

  border:none;

  background:#9e0505;

  color:white;

  padding:15px 20px;

  border-radius:14px;

  cursor:pointer;
}

/* ========================= */
/* ACCOUNT PAGE */
/* ========================= */

.page{

  display:none;
}

.account-page,
.orders-page{

  background:#f6f6f6;

  color:black;

  padding:30px;

  border-radius:25px;
}

.form-group{

  margin-bottom:20px;
}

.form-group input{

  width:100%;

  padding:16px;

  border-radius:12px;

  border:1px solid #ccc;

  font-size:16px;
}

.save-btn{

  background:#9e0505;

  color:white;

  border:none;

  padding:15px 20px;

  border-radius:14px;

  cursor:pointer;
}

/* ========================= */
/* ORDER HISTORY */
/* ========================= */

.order-history{

  display:flex;

  flex-direction:column;

  gap:20px;
}

.order-card{

  background:white;

  padding:20px;

  border-radius:18px;
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:900px){

  body{
    flex-direction:column;
    overflow:auto;
  }

  .sidebar{
    display:none;
  }

  /* NAVBAR MOBILE EMBAIXO */

  .mobile-topbar{

    display:flex;

    position:fixed;

    bottom:0;

    left:0;

    width:100%;

    background:#6b0505;

    padding:12px 10px;

    z-index:9999;

    border-top:1px solid rgba(255,255,255,0.1);
  }

  .mobile-menu{

    width:100%;

    display:flex;

    justify-content:space-around;

    align-items:center;

    gap:10px;
  }

  .mobile-menu button{

    flex:1;

    background:transparent;

    color:white;

    border:none;

    padding:14px 8px;

    border-radius:12px;

    font-size:14px;

    cursor:pointer;
  }

  .main{

    height:auto;

    overflow:visible;

    padding:15px;

    /* espaço da navbar */

    padding-bottom:110px;
  }

  .products{
    grid-template-columns:1fr;
    max-height:none;
    overflow:visible;
  }

  .product-card{
    min-height:auto;
  }

  .cart-item{
    min-width:100%;
  }
}

/* ========================= */
/* MODAL */
/* ========================= */

.modal-overlay{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  background:rgba(0,0,0,0.7);

  display:none;

  justify-content:center;
  align-items:center;

  z-index:99999;

  padding:20px;
}

.modal-box{

  background:white;

  color:black;

  width:100%;
  max-width:450px;

  border-radius:25px;

  padding:30px;

  animation:modalShow 0.2s ease;
}

.modal-box h2{

  margin-bottom:25px;

  font-size:30px;
}

.modal-box p{

  margin-bottom:12px;

  font-size:18px;
}

.modal-total{

  font-size:32px;

  font-weight:bold;

  margin:25px 0;
}

.modal-buttons{

  display:flex;

  gap:15px;

  margin-top:30px;
}

.modal-buttons button{

  flex:1;

  border:none;

  padding:16px;

  border-radius:14px;

  cursor:pointer;

  font-size:16px;

  font-weight:bold;
}

.modal-cancel{

  background:#ddd;
}

.modal-confirm{

  background:#9e0505;

  color:white;
}

@keyframes modalShow{

  from{
    transform:scale(0.9);
    opacity:0;
  }

  to{
    transform:scale(1);
    opacity:1;
  }
}

/* ========================= */
/* STATUS COLORS */
/* ========================= */

.status-delivered{

  background:#d4ffd4 !important;

  border:2px solid #59c759;
}

.status-delivery{

  background:#ffe3b3 !important;

  border:2px solid #ff9800;
}

/* STATUS MINI ICON */

.order-status-row{

  display:flex;

  align-items:center;

  gap:10px;

  margin-bottom:15px;

}

.order-status-icon{

  display:inline-flex;

  align-items:center;

  justify-content:center;

  font-size:32px;

  background:transparent !important;

  width:auto !important;

  height:auto !important;

  border-radius:0 !important;

  padding:0 !important;

  box-shadow:none !important;

}

/* RECEBIDO */

.icon-received{

  background:#3498db;

  animation:statusPulse 2s infinite;

}

/* PREPARANDO */

.icon-preparing{

  background:#f1c40f;

  animation:statusSpin 3s linear infinite;

}

/* ENTREGA */

.icon-out{

  background:#e67e22;

  animation:statusMove 1s infinite alternate;

}

/* ENTREGUE */

.icon-done{

  background:#2ecc71;

  animation:statusPop 1s infinite alternate;

}

/* ANIMAÇÕES */

@keyframes statusPulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.1);
  }

  100%{
    transform:scale(1);
  }

}

@keyframes statusSpin{

  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }

}

@keyframes statusMove{

  from{
    transform:translateX(0);
  }

  to{
    transform:translateX(6px);
  }

}

@keyframes statusPop{

  from{
    transform:scale(1);
  }

  to{
    transform:scale(1.12);
  }

}


/* ========================= */
/* MOBILE CART BUTTON */
/* ========================= */

#mobile-cart-btn{

  display:none;

}

@media(max-width:900px){

  #mobile-cart-btn{

    display:flex;

    align-items:center;

    justify-content:center;

    gap:8px;

    position:fixed;

    bottom:85px;

    right:18px;

    z-index:9999;

    border:none;

    background:#9e0505;

    color:white;

    padding:14px 18px;

    border-radius:999px;

    font-size:18px;

    font-weight:bold;

    box-shadow:0 8px 25px rgba(0,0,0,0.3);

    cursor:pointer;

  }

  #mobile-cart-count{

    background:white;

    color:#9e0505;

    min-width:24px;

    height:24px;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:14px;

    font-weight:bold;

    padding:2px;

  }

}

/* ========================= */
/* MOBILE HEADER */
/* ========================= */

.mobile-header{

  display:none;

}

@media(max-width:900px){

  .mobile-header{

    display:flex;

    flex-direction:column;

    overflow:hidden;

    border-radius:0 0 28px 28px;

    margin:-15px -15px 20px -15px;

    background:#111;

    box-shadow:0 8px 25px rgba(0,0,0,0.25);

  }

  .mobile-logo{

    width:100%;

    height:220px;

    object-fit:cover;

  }

  .mobile-header-content{

    padding:20px;

  }

  .mobile-header-content h1{

    font-size:34px;

    margin-bottom:8px;

    color:white;

  }

  .mobile-header-content p{

    color:rgba(255,255,255,0.8);

    font-size:16px;

  }

}

#combo-modal-img{
  animation: modalShow 0.2s ease;
}

.recommendation-card{
  cursor:pointer;
  transition:0.2s;
}

.recommendation-card:hover{
  transform:scale(1.02);
}

</style>
</head>

  name:'Hossomakis'
},

{

},

{

},

},

{
  image:'Imagens/salada.png',
  name:'Saladas'
}

];
/* ========================= */
/* STORAGE */
/* ========================= */

let cart =
JSON.parse(localStorage.getItem('cart')) || [];

let orders =
JSON.parse(localStorage.getItem('orders')) || [];

/* ========================= */
/* SHOW PAGE */
/* ========================= */

function showPage(id){

document.querySelectorAll('.page')
.forEach(page => {
page.style.display='none';
});

document.getElementById(id)
.style.display='block';

if(id === 'orders-page'){
renderOrders();
}

}

/* ========================= */
/* RENDER CATEGORIES */
/* ========================= */

const categoriesContainer =
document.getElementById('categories');

categories.forEach(category => {

categoriesContainer.innerHTML += `

<button
class="category-card"
onclick="filterCategory('${category.name}')"
>

<div class="category-icon">

  <img
    src="${category.image}"
    alt="${category.name}"
  >

</div>
<div class="category-name">
${category.name}
</div>

</button>

`;

});

/* ========================= */
/* FILTER */
/* ========================= */

function filterCategory(category){

if(category === 'Todos'){
renderProducts(products);
return;
}

const filtered =
products.filter(
product => product.category === category
);

renderProducts(filtered);

}

/* ========================= */
/* RENDER PRODUCTS */
/* ========================= */

function renderProducts(data){

const container =
document.getElementById('products');

container.innerHTML='';

data.forEach(product => {

container.innerHTML += `

<div class="product-card">

<img src="${product.image}">

<div class="product-content">

<h3>${product.name}</h3>

<p>${product.description}</p>

<div class="price">
R$${product.price}
</div>

<button
class="add-cart-btn"
onclick="addToCart('${product.name}',${product.price})"
>

Adicionar

</button>

</div>

</div>

`;

});

}

renderProducts(products);

/* ========================= */
/* ADD CART */
/* ========================= */

function addToCart(name,price){

cart.push({
name,
price
});

saveCart();

renderCart();

}

/* ========================= */
/* REMOVE */
/* ========================= */

function removeCart(index){

cart.splice(index,1);

saveCart();

renderCart();

}

/* ========================= */
/* SAVE */
/* ========================= */

function saveCart(){

localStorage.setItem(
'cart',
JSON.stringify(cart)
);

}

/* ========================= */
/* RENDER CART */
/* ========================= */

function renderCart(){

const cartItems =
document.getElementById('cart-items');

cartItems.innerHTML='';

let total = 0;

cart.forEach((item,index)=>{

total += item.price;

cartItems.innerHTML += `

<div class="cart-item">

<div>

<strong>${item.name}</strong>

<p>R$${item.price}</p>

</div>

<button
class="trash-btn"
onclick="removeCart(${index})"
>

🗑️

</button>

</div>

`;

});

document.getElementById('cart-total')
.innerText = `R$${total.toFixed(2)}`;

document.getElementById('sidebar-total')
.innerText = `R$${total.toFixed(2)}`;

document.getElementById(
'mobile-cart-count'
).innerText = cart.length;

window.scrollToCart = scrollToCart;

}

renderCart();

/* ========================= */
/* SAVE USER */
/* ========================= */

function saveUserData(){

  const user = {

    name:
    document.getElementById('user-name').value,

    email:
    document.getElementById('user-email').value,

    phone:
    document.getElementById('user-phone').value,

    address:
    document.getElementById('user-address').value,

    number:
    document.getElementById('user-number').value,

    complement:
    document.getElementById('user-complement').value

  };

  localStorage.setItem(
    'userData',
    JSON.stringify(user)
  );

  alert('Dados salvos!');

}

function loadUser(){

  const user =
  JSON.parse(localStorage.getItem('userData'));

  if(!user) return;

  document.getElementById('user-name').value =
  user.name || '';

  document.getElementById('user-email').value =
  user.email || '';

  document.getElementById('user-phone').value =
  user.phone || '';

  document.getElementById('user-address').value =
  user.address || '';

  document.getElementById('user-number').value =
  user.number || '';

  document.getElementById('user-complement').value =
  user.complement || '';

}

/* ========================= */
/* LOAD USER */
/* ========================= */

let pendingOrder = null;

/* ========================= */
/* FINISH ORDER */
/* ========================= */

async function finishOrder(){

  if(cart.length === 0){

    alert('Carrinho vazio!');
    return;
  }

  const payment =
  document.getElementById('payment-method').value;

  if(payment === ''){

    alert('Escolha uma forma de pagamento!');
    return;
  }

  const user =
  JSON.parse(localStorage.getItem('userData'));

  if(!user){

    alert('Preencha os dados da conta!');
    showPage('account-page');

    return;
  }

  if(
    !user.name ||
    !user.phone ||
    !user.address ||
    !user.number ||
    !user.complement
  ){

    alert('Complete todos os dados!');
    showPage('account-page');

    return;
  }

  const total =
  cart.reduce(
    (sum,item)=>sum+item.price,
    0
  );

  pendingOrder = {

    customer:user.name,

    phone:user.phone,

    address:user.address,

    number:user.number,

    complement:user.complement,

    payment,

    items:[...cart],

    total,

    status:"Recebido",

    createdAt:Date.now()

  };

  document.getElementById(
    'modal-content'
  ).innerHTML = `

    <p>
      <strong>Cliente:</strong>
      ${user.name}
    </p>

    <p>
      <strong>Telefone:</strong>
      ${user.phone}
    </p>

    <p>
      <strong>Endereço:</strong><br>
      ${user.address},
      ${user.number}
    </p>

    <p>
      ${user.complement}
    </p>

    <p>
      <strong>Pagamento:</strong>
      ${payment}
    </p>

    <div class="modal-total">
      R$${total.toFixed(2)}
    </div>

  `;

  document.getElementById(
    'order-modal'
  ).style.display = 'flex';

}

function closeOrderModal(){

  document.getElementById(
    'order-modal'
  ).style.display = 'none';

}

async function confirmOrderFirebase(){

  if(!pendingOrder) return;

  await addDoc(

    collection(db,"orders"),

    pendingOrder

  );

  cart=[];

  saveCart();

  renderCart();

  closeOrderModal();

  alert('Pedido realizado!');

}

/* ========================= */
/* GLOBAL FUNCTIONS */
/* ========================= */

window.closeOrderModal =
closeOrderModal;

window.confirmOrderFirebase =
confirmOrderFirebase;

window.finishOrder =
finishOrder;

window.showPage =
showPage;

window.addToCart =
addToCart;

window.removeCart =
removeCart;

window.filterCategory =
filterCategory;

window.saveUserData =
saveUserData;

/* ========================= */
/* RENDER ORDERS */
/* ========================= */

function renderOrders(){

  const container =
  document.getElementById('order-history');

  const user =
  JSON.parse(localStorage.getItem('userData'));

  if(!user || !user.phone){

    container.innerHTML = `
      <p>
        Faça login para ver seus pedidos.
      </p>
    `;

    return;
  }

  /* QUERY ORDENADA */

  const ordersQuery = query(

    collection(db,"orders"),

    orderBy("createdAt","desc")

  );

  onSnapshot(

    ordersQuery,

    (snapshot)=>{

      container.innerHTML='';

      let encontrouPedido = false;

      snapshot.forEach((docItem)=>{

        const order = docItem.data();

        /* FILTRO TELEFONE */

        if(order.phone !== user.phone){
          return;
        }

        encontrouPedido = true;

        /* STATUS COLOR */

        let statusClass = '';

        if(order.status === 'Entregue'){
          statusClass = 'status-delivered';
        }

        else if(
          order.status === 'Saiu para entrega'
        ){
          statusClass = 'status-delivery';
        }
        

        let icon = '';
        let iconClass = '';

        if(order.status === 'Recebido'){

          icon = '📨';
          iconClass = 'icon-received';

        }

        else if(order.status === 'Preparando'){

          icon = '🍣';
          iconClass = 'icon-preparing';

        }

        else if(order.status === 'Saiu para entrega'){

          icon = '🛵';
          iconClass = 'icon-out';

        }

        else if(order.status === 'Entregue'){

          icon = '✅';
          iconClass = 'icon-done';

        }

        container.innerHTML += `

        <div class="order-card ${statusClass}">

        <div class="order-status-row">

          <div class="order-status-icon ${iconClass}">
            ${icon}
          </div>

          <h3>
            ${order.status}
          </h3>

        </div>

          <p>
            Cliente:
            ${order.customer}
          </p>

          <p>
            Telefone:
            ${order.phone}
          </p>

          <p>
            Status:
            <strong>${order.status}</strong>
          </p>

          <p>
            Pagamento:
            ${order.payment}
          </p>

          <p>
            Itens:
            ${order.items.map(item=>item.name).join(', ')}
          </p>

          <h2>
            R$${order.total.toFixed(2)}
          </h2>

        </div>

        `;

      });

      if(!encontrouPedido){

        container.innerHTML = `
          <p>
            Você ainda não possui pedidos.
          </p>
        `;

      }

    }

  );

}

renderOrders();

window.showPage = showPage;
window.filterCategory = filterCategory;
window.addToCart = addToCart;
window.removeCart = removeCart;
window.finishOrder = finishOrder;
window.saveUserData = saveUserData;


function scrollToCart(){

  const cartSection =
  document.querySelector('.cart-container');

  if(cartSection){

    cartSection.scrollIntoView({

      behavior:'smooth'

}

let selectedCombo = null;

function openComboModal(combo){

  selectedCombo = combo;

  document.getElementById('combo-modal-img').src = combo.image;
  document.getElementById('combo-modal-name').innerText = combo.name;
  document.getElementById('combo-modal-desc').innerText = combo.description;
  document.getElementById('combo-modal-price').innerText = `R$${combo.price.toFixed(2)}`;

  document.getElementById('combo-modal').style.display = 'flex';
}

function closeComboModal(){
  document.getElementById('combo-modal').style.display = 'none';
}

function confirmAddCombo(){

  if(!selectedCombo) return;

  cart.push({
    name: selectedCombo.name,
    price: selectedCombo.price
  });

  saveCart();
  renderCart();

  closeComboModal();

  }

  window.openComboModal = openComboModal;
  window.closeComboModal = closeComboModal;
  window.confirmAddCombo = confirmAddCombo;

</script>

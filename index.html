<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Kaizora</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#ffff;
  color:white;
  display:flex;
  min-height:100vh;
  overflow:hidden;
}

/* ========================= */
/* SIDEBAR DESKTOP */
/* ========================= */

.sidebar{

  width:270px;

  background:#410202;

  padding:30px 20px;

  padding-top:0;

  display:flex;

  flex-direction:column;

  justify-content:space-between;

  position:sticky;

  top:0;

  height:100vh!important;

  overflow-x: hidden;

  overflow-y:hidden!important;
}

.logo{
  font-size:42px;
  font-weight:bold;
  margin-bottom:40px;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.menu-item{
  width:100%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  color:white;

  display:flex;
  align-items:center;
  gap:14px;

  font-size:18px;
  font-weight:600;

  padding:16px 18px;
  border-radius:16px;

  cursor:pointer;
  transition:0.25s ease;

  backdrop-filter: blur(6px);
}

/* HOVER MAIS BONITO */
.menu-item:hover{
  background:rgba(255,255,255,0.15);
  transform:translateX(6px);
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

/* EFEITO DE “CLIQUE” */
.menu-item:active{
  transform:translateX(3px) scale(0.98);
}

/* ÍCONES MAIS DESTACADOS */
.menu-item{
  position:relative;
}

/* LINHA LATERAL NO HOVER */
.menu-item::before{
  content:'';
  position:absolute;
  left:0;
  top:10px;
  bottom:10px;
  width:4px;
  border-radius:10px;
  background:transparent;
  transition:0.25s;
}

.menu-item:hover::before{
  background:#ffffff;
}

/* ========================= */
/* MAIN */
/* ========================= */

.main{

  flex:1;

  overflow-y:auto;

  height:100vh;

  padding:30px;

  background:#ffffff; /* 👈 aqui */
}

.mobile-topbar{
  display:none;
}

.mobile-menu{
  display:none;
}

.cart-mobile-actions{
  display:none;
  gap:12px;
  margin-top:20px;
}

@media(max-width:900px){


    .mobile-topbar{

    display:flex;

    justify-content:center;

    align-items:center;

    position:fixed;

    bottom:0;

    left:0;

    width:100%;

    background:#6b0505;

    padding:12px 10px;

    z-index:9999;

    border-top:1px solid rgba(255,255,255,0.1);
    }

    .mobile-menu{

    width:100%;

    display:flex;

    justify-content:space-around;

    align-items:center;

    gap:10px;
    }

    .mobile-menu button{

    flex:1;

    background:transparent;

    color:white;

    border:none;

    padding:14px 8px;

    border-radius:12px;

    font-size:14px;

    cursor:pointer;

    transition:0.2s;
    }

    .mobile-menu button:hover{

    background:rgba(255,255,255,0.1);
    }

  .main{

    padding-bottom:110px;
  }

  @media(max-width:900px){

    .cart-mobile-actions{

      display:flex !important;

    }

  }

  .cart-mobile-actions .finish-order-btn{

    flex:1;

    margin-top:0;

  }

  @media(max-width:900px){
  .cart-mobile-actions{
    display:flex !important;
  }
}
  
}



/* ========================= */
/* RECOMMENDATIONS */
/* ========================= */

.recommendations{

  background:#3a0101ee;

  padding:25px;

  border-radius:25px;

  margin-bottom:25px;
}

.recommendations h2{
  font-size:36px;
  margin-bottom:20px;
}

.recommendation-list{

  display:flex;

  gap:20px;

  overflow-x:auto;

  overflow-y:hidden;

  padding-bottom:10px;

  scroll-behavior:smooth;
}

/* SCROLLBAR */

.recommendation-list::-webkit-scrollbar{
  height:8px;
}

.recommendation-list::-webkit-scrollbar-thumb{

  background:rgba(255,255,255,0.3);

  border-radius:20px;
}

/* CARDS FIXOS */

.recommendation-card{

  min-width:320px;

  flex-shrink:0;

  background:white;

  color:black;

  border-radius:18px;

  padding:15px;

  display:flex;

  gap:15px;

  align-items:center;
}

.recommendation-card img{

  width:70px;

  height:70px;

  object-fit:cover;

  border-radius:14px;
}

/* ========================= */
/* MENU CONTAINER */
/* ========================= */

.menu-container{

  background:#420101;

  color:black;

  border-radius:25px;

  padding:30px;
}

/* ========================= */
/* CATEGORIES */
/* ========================= */

.categories{

  display:flex;

  gap:15px;

  overflow-x:auto;

  padding-bottom:10px;

  margin-bottom:30px;
}

.categories::-webkit-scrollbar{
  height:6px;
}

.category-card{

  min-width:120px;

  background:#fffffff6;

  border:none;

  border-radius:18px;

  padding:20px;

  cursor:pointer;

  transition:0.2s;
}

.category-card:hover{
  transform:translateY(-3px);
}

.category-icon{

  display:flex;
  justify-content:center;
  align-items:center;

  margin-bottom:10px;
}

.category-icon img{

  width:52px;
  height:52px;

  object-fit:contain;

  transition:0.25s;
}

.category-card:hover .category-icon img{

  transform:
  scale(1.08)
  rotate(-4deg);

}

.category-name{
  font-size:16px;
}

/* ========================= */
/* PRODUCTS */
/* ========================= */

.products{

  display:grid;

  grid-template-columns:repeat(3,1fr);

  gap:25px;

  padding-right:0;

}

.products::-webkit-scrollbar{
  width:8px;
}

.products::-webkit-scrollbar-thumb{
  background:#ffffff;
  border-radius:20px;
}

.product-card{

  background:white;

  border-radius:25px;

  overflow:hidden;

  display:flex;

  flex-direction:column;

  min-height:450px;
}

.product-card img{

  width:100%;

  height:240px;

  object-fit:cover;
}

.product-content{

  padding:20px;

  display:flex;

  flex-direction:column;

  flex:1;
}

.product-content h3{
  font-size:30px;
  margin-bottom:10px;
}

.product-content p{

  color:#555;

  flex:1;

  margin-bottom:15px;
}

.price{

  font-size:28px;

  font-weight:bold;
}

.add-cart-btn{

  margin-top:20px;

  border:none;

  background:#9e0505;

  color:white;

  padding:15px;

  border-radius:14px;

  cursor:pointer;

  font-size:16px;
}


/* HOVER MAIS CLARO */
.add-cart-btn:hover{
  background:#c20707;
  transform:translateY(-2px);
  box-shadow:0 6px 15px rgba(158, 5, 5, 0.25);
}

/* CLIQUE */
.add-cart-btn:active{
  transform:translateY(0px) scale(0.98);
}

/* ========================= */
/* CART */
/* ========================= */

.cart-container{

  background:white;

  color:black;

  padding:25px;

  border-radius:25px;

  margin-bottom:30px;
}

.cart-container h2{
  margin-bottom:20px;
}

#cart-items{
  overflow-y:auto;
  max-height:55vh;
  padding-right:6px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.cart-item{
  background:#f3f3f3;
  padding:15px 18px;
  border-radius:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  width:100%;
  min-height:72px;
}

.trash-btn{

  background:#b30000;

  border:none;

  color:white;

  width:45px;

  height:45px;

  border-radius:12px;

  cursor:pointer;
}

.finish-order-btn{

  margin-top:20px;

  border:none;

  background:#9e0505;

  color:white;

  padding:15px 20px;

  border-radius:14px;

  cursor:pointer;
}

/* HOVER MAIS CLARO */
.finish-order-btn:hover{
  background:#c20707;
  transform:translateY(-2px);
  box-shadow:0 6px 15px rgba(158, 5, 5, 0.25);
}

/* CLIQUE */
.finish-order-btn:active{
  transform:translateY(0px) scale(0.98);
}


/* ========================= */
/* ACCOUNT PAGE */
/* ========================= */

.page{

  display:none;
}

.account-page,
.orders-page{

  background:#f6f6f6;

  color:black;

  padding:30px;

  border-radius:25px;
}

.form-group{

  margin-bottom:20px;
}

.form-group input{

  width:100%;

  padding:16px;

  border-radius:12px;

  border:1px solid #ccc;

  font-size:16px;
}

.save-btn{

  background:#9e0505;

  color:white;

  border:none;

  padding:15px 20px;

  border-radius:14px;

  cursor:pointer;
}

/* ========================= */
/* ORDER HISTORY */
/* ========================= */

.order-history{

  display:flex;

  flex-direction:column;

  gap:20px;
}

.order-card{

  background:white;

  padding:20px;

  border-radius:18px;
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:900px){

  body{
    flex-direction:column;
    overflow:auto;
  }

  .sidebar{
    display:none;
  }

  /* NAVBAR MOBILE EMBAIXO */

  .mobile-topbar{

    display:flex;

    position:fixed;

    bottom:0;

    left:0;

    width:100%;

    background:#490f00c5;

    padding:12px 10px;

    z-index:9999;

    border-top:1px solid rgba(255,255,255,0.1);
  }

  .mobile-menu{

    width:100%;

    display:flex;

    justify-content:space-around;

    align-items:center;

    gap:10px;
  }

  .mobile-menu button{

    flex:1;

    background:transparent;

    color:white;

    border:none;

    padding:14px 8px;

    border-radius:12px;

    font-size:14px;

    cursor:pointer;
  }

  .main{

    height:auto;

    overflow:visible;

    padding:15px;

    padding-bottom:110px;
  }

  .products{
    grid-template-columns:1fr;
    max-height:none;
    overflow:visible;
  }

  .product-card{
    min-height:auto;
  }

  .cart-item{
    min-width:100%;
  }
}

/* ========================= */
/* MODAL */
/* ========================= */

.modal-overlay{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  background:rgba(255, 255, 255, 0.7);

  display:none;

  justify-content:center;
  align-items:center;

  z-index:99999;

  padding:20px;
}

.modal-box{

  background:white;

  color:black;

  width:100%;
  max-width:450px;

  border-radius:25px;

  padding:30px;

  animation:modalShow 0.2s ease;
}

.modal-box h2{

  margin-bottom:25px;

  font-size:30px;
}

.modal-box p{

  margin-bottom:12px;

  font-size:18px;
}

.modal-total{

  font-size:32px;

  font-weight:bold;

  margin:25px 0;
}

.modal-buttons{

  display:flex;

  gap:15px;

  margin-top:30px;
}

.modal-buttons button{

  flex:1;

  border:none;

  padding:16px;

  border-radius:14px;

  cursor:pointer;

  font-size:16px;

  font-weight:bold;
}

.modal-cancel{

  background:#ddd;
}

.modal-confirm{

  background:#9e0505;

  color:white;
}

@keyframes modalShow{

  from{
    transform:scale(0.9);
    opacity:0;
  }

  to{
    transform:scale(1);
    opacity:1;
  }
}

/* ========================= */
/* STATUS COLORS */
/* ========================= */

.status-delivered{

  background:#d4ffd4 !important;

  border:2px solid #59c759;
}

.status-delivery{

  background:#ffe3b3 !important;

  border:2px solid #ff9800;
}

/* STATUS MINI ICON */

.order-status-row{

  display:flex;

  align-items:center;

  gap:10px;

  margin-bottom:15px;

}

.order-status-icon{

  display:inline-flex;

  align-items:center;

  justify-content:center;

  font-size:32px;

  background:transparent !important;

  width:auto !important;

  height:auto !important;

  border-radius:0 !important;

  padding:0 !important;

  box-shadow:none !important;

}

/* RECEBIDO */

.icon-received{

  background:#3498db;

  animation:statusPulse 2s infinite;

}

/* PREPARANDO */

.icon-preparing{

  background:#f1c40f;

  animation:statusSpin 3s linear infinite;

}

/* ENTREGA */

.icon-out{

  background:#e67e22;

  animation:statusMove 1s infinite alternate;

}

/* ENTREGUE */

.icon-done{

  background:#2ecc71;

  animation:statusPop 1s infinite alternate;

}

/* ANIMAÇÕES */

@keyframes statusPulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.1);
  }

  100%{
    transform:scale(1);
  }

}

@keyframes statusSpin{

  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }

}

@keyframes statusMove{

  from{
    transform:translateX(0);
  }

  to{
    transform:translateX(6px);
  }

}

@keyframes statusPop{

  from{
    transform:scale(1);
  }

  to{
    transform:scale(1.12);
  }

}


/* ========================= */
/* MOBILE CART BUTTON */
/* ========================= */

#mobile-cart-btn{

  display:none;

}

/* ========================= */
/* MOBILE HEADER */
/* ========================= */

.mobile-header{

@media(max-width:900px){

#combo-modal-img{

}

async function finishOrder(){

  if(cart.length === 0){
    alert('Carrinho vazio!');
    return;
  }

  const payment =
    document.getElementById('payment-method').value;

  if(payment === ''){
    alert('Escolha uma forma de pagamento!');
    return;
  }

  const user =
    JSON.parse(localStorage.getItem('userData'));

  if(!user){
    alert('Preencha os dados da conta!');
    showPage('account-page');
    return;
  }

  if(
    !user.name ||
    !user.phone ||
    !user.address ||
    !user.number ||
    !user.complement
  ){
    alert('Complete todos os dados!');
    showPage('account-page');
    return;
  }

  // ✅ PEGA OS ADDONS REAIS DO ESTADO GLOBAL
  const addonsCopy = { ...addons };

  const baseTotal =
    cart.reduce((sum,item)=>sum+item.price,0) + (cart.length > 0 ? 2 : 0);

  const addonTotal =
    (addonsCopy.tare * 0.5) +
    (addonsCopy.teriyaki * 0.5);

  const total = baseTotal + addonTotal;

  pendingOrder = {
    customer: user.name,
    phone: user.phone,
    address: user.address,
    number: user.number,
    complement: user.complement,
    payment,
    items: [...cart],
    total,
    addons: addonsCopy,
    status: "Recebido",
    createdAt: Date.now()
  };

  document.getElementById('modal-content').innerHTML = `
    <p><strong>Cliente:</strong> ${user.name}</p>
    <p><strong>Telefone:</strong> ${user.phone}</p>
    <p><strong>Endereço:</strong><br>${user.address}, ${user.number}</p>
    <p>${user.complement}</p>
    <p><strong>Pagamento:</strong> ${payment}</p>

    <p><strong>Adicionais:</strong></p>
    <p>
      Hashi: ${addonsCopy.hashi || 0}<br>
      Tarê: ${addonsCopy.tare || 0}<br>
    </p>

    <div class="modal-total">
      R$${total.toFixed(2)}
    </div>
  `;

  document.getElementById('order-modal').style.display = 'flex';

  requestAnimationFrame(() => {
    document.querySelector('.modal-box').scrollTop = 0;
  });
}

function closeOrderModal(){

  document.getElementById(
    'order-modal'
  ).style.display = 'none';

}

async function confirmOrderFirebase(){

  if(!pendingOrder) return;

  const addonsCopy = { ...addons };

  const baseTotal =
    cart.reduce((sum, item) => sum + item.price, 0) + (cart.length > 0 ? 2 : 0);

  const addonTotal =
    (addonsCopy.tare * 0.5) +
    (addonsCopy.teriyaki * 0.5);

  const total = baseTotal + addonTotal;

  pendingOrder.addons = addonsCopy;
  pendingOrder.total = total;

  // Gera o próximo ID sequencial
  let nextId = 1;

  try {

    const counterRef = doc(db, "meta", "orderCounter");
    const counterSnap = await getDoc(counterRef);

    if(counterSnap.exists()){
      nextId = (counterSnap.data().current || 0) + 1;
      await updateDoc(counterRef, { current: nextId });
    } else {
      // Primeira vez: cria o documento com current: 1
      await setDoc(counterRef, { current: 1 });
      nextId = 1;
    }

  } catch(e) {
    console.error('Erro no contador:', e);
    // Mesmo se o contador falhar, salva o pedido sem ID sequencial
    nextId = Date.now();
  }

  pendingOrder.orderId = nextId;

  try {

    await addDoc(collection(db, "orders"), pendingOrder);

    cart = [];
    saveCart();
    renderCart();
    resetAddonUI();
    closeOrderModal();

    alert(`Pedido #${nextId} realizado!`);

  } catch(e) {
    console.error('Erro ao salvar pedido:', e);
    alert('Erro ao enviar pedido. Verifique sua conexão e tente novamente.');
  }

}

/* ========================= */
/* RENDER ORDERS */
/* ========================= */

function renderOrders(){

  const container =
  document.getElementById('order-history');

  const user =
  JSON.parse(localStorage.getItem('userData'));

  if(!user || !user.phone){

    container.innerHTML = `
      <p>
        Faça login para ver seus pedidos.
      </p>
    `;

    return;
  }

  /* QUERY ORDENADA */

  const ordersQuery = query(

    collection(db,"orders"),

    orderBy("createdAt","desc")

  );

  onSnapshot(

    ordersQuery,

    (snapshot)=>{

      container.innerHTML='';

      let encontrouPedido = false;

      snapshot.forEach((docItem)=>{

        const order = docItem.data();

        /* FILTRO TELEFONE */

        if(order.phone !== user.phone){
          return;
        }

        encontrouPedido = true;

        /* STATUS COLOR */

        let statusClass = '';

        if(order.status === 'Entregue'){
          statusClass = 'status-delivered';
        }

        else if(
          order.status === 'Saiu para entrega'
        ){
          statusClass = 'status-delivery';
        }
        

        let icon = '';
        let iconClass = '';

        if(order.status === 'Recebido'){

          icon = '📨';
          iconClass = 'icon-received';

        }

        else if(order.status === 'Preparando'){

          icon = '🍣';
          iconClass = 'icon-preparing';

        }

        else if(order.status === 'Saiu para entrega'){

          icon = '🛵';
          iconClass = 'icon-out';

        }

        else if(order.status === 'Entregue'){

          icon = '✅';
          iconClass = 'icon-done';

        }

        container.innerHTML += `

        <div class="order-card ${statusClass}">

        <div class="order-status-row">

          <div class="order-status-icon ${iconClass}">
            ${icon}
          </div>

          <h3>
            ${order.status}
          </h3>

        </div>

         <p><strong>Pedido #${order.orderId || '—'}</strong></p>

          <p>
            Cliente:
            ${order.customer}
          </p>

          <p>
            Telefone:
            ${order.phone}
          </p>

          <p>
            Status:
            <strong>${order.status}</strong>
          </p>

          <p>
            Pagamento:
            ${order.payment}
          </p>

          <p>
            Itens:
            ${order.items.map(item=>item.name).join(', ')}
          </p>

          <h2>
            R$${order.total.toFixed(2)}
          </h2>

        </div>

        `;

      });

      if(!encontrouPedido){

        container.innerHTML = `
          <p>
            Você ainda não possui pedidos.
          </p>
        `;

      }

    }

  );

}

renderOrders();

comboList.addEventListener('wheel', (e) => {

  comboList.scrollLeft += e.deltaY;

});

let addons = {
  hashi: 0,
  tare: 0,
  teriyaki: 0
};

const ADDON_PRICE = {
  tare: 0.5,
  teriyaki: 0.5
};


function calculateTotal(){

  const baseTotal =
    cart.reduce((sum, item) => sum + item.price, 0) + 2;

  const addonTotal =
    (addons.tare * ADDON_PRICE.tare) +
    (addons.teriyaki * ADDON_PRICE.teriyaki);

  return baseTotal + addonTotal;
}

function updateModalTotal(){

  const total = calculateTotal();

  const el = document.querySelector('.modal-total');

  if(el){
    el.innerText = `R$${total.toFixed(2)}`;
  }
}

function changeAddon(type, value){

  if(!addons[type] && addons[type] !== 0) return;

  addons[type] = Math.max(0, addons[type] + value);

  const el = document.getElementById(`qty-${type}`);

  if(el){
    el.innerText = addons[type];
  }

  updateModalTotal();
}

function resetAddonUI(){

  Object.keys(addons).forEach(key=>{
    addons[key] = 0;

    const el = document.getElementById(`qty-${key}`);
    if(el) el.innerText = 0;
  });

  updateModalTotal();
}

window.changeAddon = changeAddon;
window.resetAddonUI = resetAddonUI;
window.updateModalTotal = updateModalTotal;

</script>

<!-- ETAPA 1 - ESTRUTURA HTML -->
<!-- Criamos toda a estrutura principal do site -->
<!-- Sidebar + conteúdo principal -->
<!-- ============================== -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoodTime</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#000000;
      display:flex;
      min-height:100vh;
    }

    /* ============================== */
    /* SIDEBAR */
    /* ============================== */

    .sidebar{
      width:260px;
      background:#6b0505;
      color:rgb(255, 255, 255);
      padding:40px 30px;

      display:flex;
      flex-direction:column;
      justify-content:space-between;

      position:sticky;
      top:0;
      height:100vh;
    }

    .logo{
      font-size:48px;
      font-weight:bold;
      margin-bottom:60px;
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap:25px;
    }

    .menu-item{
      display:flex;
      align-items:center;
      gap:15px;

      font-size:22px;

      background:transparent;
      border:none;

      color:white;

      cursor:pointer;
      transition:0.2s;
    }

    .menu-item:hover{
      transform:translateX(5px);
    }

    /* ============================== */
    /* TOTAL SIDEBAR */
    /* ============================== */

    .sidebar-cart-total{

      background:rgba(255, 255, 255, 0.219);

      border:1px solid rgb(255, 255, 255);

      border-radius:20px;

      padding:20px;

      backdrop-filter:blur(6px);
    }

    .sidebar-cart-total p{
      font-size:18px;
      opacity:0.8;
      margin-bottom:10px;
    }

    .sidebar-cart-total h2{
      font-size:42px;
      color:#ffffff;
    }

    #sidebar-finish-order-btn{

      margin-top:30px;

      width:100%;

      padding:16px;

      background:#ffffff;

      color:#000000;

      border:none;

      border-radius:16px;

      font-size:18px;

      font-weight:bold;

      cursor:pointer;

      transition:0.2s;
    }

    #sidebar-finish-order-btn:hover{
      transform:translateY(-2px);
      background:#ffd43b;
    }

    /* ============================== */
    /* MAIN */
    /* ============================== */

    .main{
      flex:1;
      padding:30px;
    }

    /* ============================== */
    /* RECOMMENDATIONS */
    /* ============================== */

    .recommendations{
      background:#610c0c;
      padding:30px;
      border-radius:25px;
      margin-bottom:30px;
    }

    .recommendations-header{
      display:flex;
      justify-content:space-between;
      margin-bottom:20px;
    }

    .recommendations-header h2{
      font-size:42px;
      color:#ffffff;
    }

    .recommendation-list{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:20px;
    }

    .recommendation-card{
      background:white;
      padding:15px;
      border-radius:20px;

      display:flex;
      align-items:center;
      gap:15px;
    }

    .recommendation-card img{
      width:70px;
      height:70px;
      object-fit:cover;
      border-radius:15px;
    }

    /* ============================== */
    /* MENU */
    /* ============================== */

    .menu-container{
      background:#f6f6f6;
      padding:30px;
      border-radius:25px;
    }

    .category-header{
      display:flex;
      gap:40px;
      margin-bottom:40px;
      align-items:center;
    }

    .category-title h2{
      font-size:52px;
      line-height:1.1;
    }

    .categories{
      display:flex;
      flex-wrap:wrap;
      gap:20px;
    }

    .category-card{
      width:130px;
      height:140px;

      background:#edf6f4;

      border-radius:20px;

      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;

      cursor:pointer;

      transition:0.2s;

      border:none;
    }

    .category-card:hover{
      background:#dcefeb;
      transform:translateY(-3px);
    }

    .category-icon{
      font-size:45px;
      margin-bottom:10px;
    }

    .category-name{
      font-size:18px;
      color:#000000;
    }

    hr{
      margin:30px 0;
      border:1px solid #ddd;
    }

    /* ============================== */
    /* CARRINHO */
    /* ============================== */

    .cart-container{
      background:white;
      padding:25px;
      border-radius:20px;
      margin-bottom:30px;
    }

    .cart-container h2{
      font-size:36px;
      margin-bottom:20px;
    }

    .cart-container h3{
      margin-top:20px;
      font-size:28px;
    }

    /* ============================== */
    /* ADDRESS */
    /* ============================== */

    .address-form{

      margin:30px 0;

      display:flex;
      flex-direction:column;

      gap:15px;
    }

    .address-form h3{
      font-size:28px;
    }

    .address-form input{

      padding:15px;

      border-radius:12px;

      border:1px solid #ccc;

      font-size:16px;
    }

    .cart-container label{
      display:block;
      margin-top:20px;
      margin-bottom:10px;
      font-size:18px;
      font-weight:bold;
    }

    .cart-container select{
      width:250px;
      padding:12px;
      border-radius:10px;
      font-size:16px;
    }

    .finish-order-btn{

      margin-top:20px;

      background:#ac0808;

      color:white;

      border:none;

      padding:15px 25px;

      border-radius:12px;

      font-size:18px;

      cursor:pointer;
    }

    .finish-order-btn:hover{
      background:#ac0808;
    }

    /* ============================== */
    /* PRODUCTS */
    /* ============================== */

    .products-title{
      font-size:48px;
      margin-bottom:30px;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:25px;
    }

    .product-card{
      background:white;
      border-radius:25px;
      overflow:hidden;
      transition:0.3s;
      display:flex;
      flex-direction:column;
      height:100%;
    }

    .product-card:hover{
      transform:translateY(-5px);
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
    }

    .product-card img{
      width:100%;
      height:240px;
      object-fit:cover;
    }

    .product-content{
      padding:20px;
      display:flex;
      flex-direction:column;
      flex:1;
    }

    .product-content h3{
      font-size:36px;
      margin-bottom:10px;
    }

    .product-content p{
      color:rgb(0, 0, 0);
      margin-bottom:15px;
    }

    .price{
      font-size:32px;
      color:#000000;
      font-weight:bold;
    }

    .add-cart-btn{
      margin-top:15px;
      width:100%;
      padding:14px;

      background:#ac0808;
      color:white;

      border:none;
      border-radius:12px;

      font-size:18px;
      cursor:pointer;
    }

    .add-cart-btn:hover{
      background:#ff0e0e;
    }
    /* ============================== */
    /* TAMANHO FIXO DOS CARDS */
    /* ============================== */

    .product-card{

      min-height:400px;
    }

    /* ============================== */
    /* IMAGEM PADRONIZADA */
    /* ============================== */

    .product-card img{

      height:260px;

      object-fit:cover;
    }

    /* ============================== */
    /* DESCRIÇÃO */
    /* ============================== */

    .product-content p{

      flex-grow:1;
    }

    /* ============================== */
    /* BOTÃO SEMPRE EMBAIXO */
    /* ============================== */

    .add-cart-btn{

      margin-top:auto;
    }

    /* ============================== */
    /* CART ITEMS */
    /* ============================== */

    #cart-items{
      display:flex;
      flex-wrap:wrap;
      gap:15px;
    }

    .cart-item{

      background:#f4f4f4;

      padding:15px 20px;

      border-radius:16px;

      display:flex;
      align-items:center;
      justify-content:space-between;

      gap:20px;

      min-width:220px;

      flex:1;
    }

    .trash-btn{

      background:#d62828;

      border:none;

      width:50px;
      height:50px;

      border-radius:12px;

      font-size:24px;

      cursor:pointer;

      transition:0.2s;

      display:flex;
      align-items:center;
      justify-content:center;
    }

    .trash-btn:hover{
      background:#b71c1c;
      transform:scale(1.1);
    }

    /* ============================== */
    /* RESPONSIVO */
    /* ============================== */

    @media(max-width:1200px){

      .products,
      .recommendation-list{
        grid-template-columns:repeat(2,1fr);
      }
    }

    @media(max-width:900px){

      body{
        flex-direction:column;
      }

      .sidebar{
        width:100%;
        height:auto;
      }

      .products,
      .recommendation-list{
        grid-template-columns:1fr;
      }

      .category-header{
        flex-direction:column;
        align-items:flex-start;
      }
    }
    /* ============================== */
    /* PÁGINA DE ENDEREÇO */
    /* ============================== */

    .address-page {

      display: none;

      width: 100%;

      min-height: 100vh;

      justify-content: center;

      align-items: center;

      padding: 40px;
    }

    .address-card {

      width: 100%;

      max-width: 700px;

      background: white;

      padding: 40px;

      border-radius: 30px;

      display: flex;

      flex-direction: column;

      gap: 20px;
    }

    .address-card h1 {

      font-size: 42px;

      color: #000000;

      margin-bottom: 10px;
    }

    .address-card input {

      padding: 18px;

      border-radius: 14px;

      border: 1px solid #ccc;

      font-size: 18px;
    }

    .address-card button {

      margin-top: 20px;

      padding: 18px;

      background: #ff0e0e;

      color: white;

      border: none;

      border-radius: 14px;

      font-size: 18px;

      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- ============================== -->
  <!-- SIDEBAR -->
  <!-- ============================== -->

  <aside class="sidebar">

    <div>

      <div class="logo">
        Sushi bar
    
      </div>

      <div class="menu">

        <button class="menu-item">🍽️ Menu</button>

        <button class="menu-item">📄 Pedidos</button>

        <button class="menu-item"onclick="openAddressPage()">🏠 Endereço</button>

        <button class="menu-item">🔔 Notificações</button>

        <button class="menu-item">💬 Contato</button>

        <button class="menu-item">⚙️ Sua Conta</button>

        <button class="menu-item">↩️ Sair</button>

      </div>

    </div>

    <!-- TOTAL -->

    <div class="sidebar-cart-total">

      <p>Carrinho Total</p>

      <h2 id="sidebar-total">
        $0.00
      </h2>

      <button
        id="sidebar-finish-order-btn"
        onclick="finalizar()"
      >
        Finalizar Pedido
      </button>

    </div>

  </aside>

  <!-- ============================== -->
  <!-- MAIN -->
  <!-- ============================== -->

<main class="main" id="menu-page" >

    <!-- RECOMMENDATIONS -->

    <section class="recommendations">

      <div class="recommendations-header">
        <h2>Queridinhos</h2>
      </div>

      <div
        class="recommendation-list"
        id="recommendation-list"
      ></div>

    </section>

    <!-- MENU -->

    <section class="menu-container">

      <div class="category-header">

        <div class="category-title">
          <h2>Menu<br>Categorias</h2>
        </div>

        <div
          class="categories"
          id="categories"
        ></div>

      </div>

      <hr>

      <!-- ============================== -->
      <!-- CARRINHO -->
      <!-- ============================== -->

      <div class="cart-container">

        <h2>🛒 Carrinho</h2>

        <div id="cart-items"></div>

  
        <!-- TOTAL -->

        <h3>
          Total:
          <span id="cart-total">R$0.00</span>
        </h3>

        <!-- PAYMENT -->

        <label>
          Metodo de Pagamento
        </label>

        <select id="payment-method">

          <option value="">
            Opção de Pagamento
          </option>

          <option value="Credit Card">
            Cartão de Crédito
          </option>

          <option value="Debit Card">
            Cartão de Debito
          </option>

          <option value="Pix">
            Pix
          </option>

          <option value="Cash">
            Dinheiro
          </option>

        </select>

        <!-- FINISH -->

        <button
          class="finish-order-btn"
          onclick="finishOrder()"
        >
          Finalizar
        </button>

      </div>

      <!-- PRODUCTS -->

      <h2 class="products-title">
        Choose Order
      </h2>

      <div
        class="products"
        id="products"
      ></div>

    </section>

  </main>
<!-- ============================== -->
<!-- PÁGINA DE ENDEREÇO -->
<!-- ============================== -->

<section
  id="address-page"
  class="address-page"
>

  <div class="address-card">

    <h1>🏠 Endereço para entrega</h1>

    <input
      type="text"
      id="customer-name"
      placeholder="Nome Completo"
    >

    <input
      type="text"
      id="customer-address"
      placeholder="Endereço"
    >

    <input
      type="text"
      id="customer-city"
      placeholder="Bairro"
    >

    <input
      type="text"
      id="customer-zip"
      placeholder="Complemento"
    >

    <button onclick="goBackMenu()">
      ← Voltar para o Menu
    </button>

  </div>

</section>

      }
    ];

    // ==============================
    // PRODUCTS
    // ==============================

    const products = [

      {
        name:'Hot Roll Philadelphia (Salmão)',
        category:'Hots',
        description:'Salmão fresco, cream cheese Philadelphia, arroz japonês temperado, alga nori e massa crocante empanada, finalizado com fritura dourada e sequinha.',
        price:'$152.00',
        image:'https://www.receiteria.com.br/wp-content/uploads/hot-roll-com-salmao-grelhado-capa-730x480.jpg'
      },

      {
        name:'Hot Roll Philadelphia (Atum)',
        category:'Hots',
        description:'Atum temperado, cream cheese Philadelphia, arroz japonês temperado, alga nori e massa crocante empanada, frito até ficar dourado e crocante.',
        price:'$68.75',
        image:'Imagens/Hot Roll Atum.png'
      },

      {
        name:'Roll Phildelphia (Salmão)',
        category:'Rolls',
        description:'Preparado com salmão fresco, cream cheese, arroz japonês e alga nori. Uma combinação clássica e delicada.',
        price:'$15.90',
        image:'Imagens/Roll Salmão.png'
      },
      {
        name:'Roll Phildelphia (Atum)',
        category:'Rolls',
        description:'Preparado com atum temperado, cream cheese, arroz japonês e alga nori. Uma combinação saborosa e equilibrada.',
        price:'$15.90',
        image:'Imagens/Roll Atum.png'
      },
      {
        name:'Haru Hot (Salmão)',
        category:'Hots',
        description:'Preparado com salmão fresco, cream cheese, arroz japonês e massa de rolinho primavera, frito até ficar crocante.',
        price:'$15.90',
        image:'https://i.pinimg.com/736x/06/fc/2d/06fc2d274812a209bd94365b9a8f69b6.jpg'
      },
            {
        name:'Wine',
        category:'Bebidas',
        description:'Vinho premium.',
        price:'$15.90',
        image:'https://images.unsplash.com/photo-1516594915697-87eb3b1c14ea?q=80&w=1200&auto=format&fit=crop'
      }
    ];

    // ==============================
    // RENDER CATEGORIES
    // ==============================

    const categoriesContainer =
      document.getElementById('categories');

    categories.forEach(category => {

      categoriesContainer.innerHTML += `
        <button
          class="category-card"
          onclick="filterCategory('${category.name}')"
        >

          <div class="category-icon">
            ${category.icon}
          </div>

          <div class="category-name">
            ${category.name}
          </div>

        </button>
      `;
    });

    // ==============================
    // FILTER CATEGORY
    // ==============================

    function filterCategory(categoryName){

      if(categoryName === 'Todos os Pratos'){
        renderProducts(products);
        return;
      }

      const filtered =
        products.filter(product =>
          product.category === categoryName
        );

      renderProducts(filtered);
    }

    // ==============================
    // RENDER RECOMMENDATIONS
    // ==============================

    const recommendationContainer =
      document.getElementById(
        'recommendation-list'
      );

    recommendations.forEach(item => {

      recommendationContainer.innerHTML += `
        <div class="recommendation-card">

          <img
            src="${item.image}"
            alt="${item.name}"
          >

          <div>

            <h3>${item.name}</h3>

            <p>${item.price}</p>

          </div>

        </div>
      `;
    });

    // ==============================
    // PRODUCTS
    // ==============================

    const productsContainer =
      document.getElementById('products');

    function renderProducts(filteredProducts){

      productsContainer.innerHTML = '';

      filteredProducts.forEach(product => {

        productsContainer.innerHTML += `

          <div class="product-card">

            <img
              src="${product.image}"
              alt="${product.name}"
            >

            <div class="product-content">

              <h3>${product.name}</h3>

              <p>${product.description}</p>

              <div class="price">
                ${product.price}
              </div>

              <button
                onclick="addToCart('${product.name}','${product.price}')"
                class="add-cart-btn"
              >
                Add To Cart
              </button>

            </div>

          </div>
        `;
      });
    }

    renderProducts(products);

    // ==============================
    // ADD CART
    // ==============================

    function addToCart(name,price){

      const numericPrice =
        parseFloat(
          price.replace('$','')
        );

      cart.push({
        name,
        price:numericPrice
      });

      renderCart();
    }
    // ==============================
    // ABRIR PÁGINA DE ENDEREÇO
    // ==============================

    function openAddressPage() {

      document.getElementById(
        'menu-page'
      ).style.display = 'none';

      document.getElementById(
        'address-page'
      ).style.display = 'flex';
    }

    // ==============================
    // VOLTAR PARA MENU
    // ==============================

    function goBackMenu() {

      document.getElementById(
        'menu-page'
      ).style.display = 'block';

      document.getElementById(
        'address-page'
      ).style.display = 'none';
    }

    // ==============================
    // RENDER CART
    // ==============================

    function renderCart(){

      const cartItems =
        document.getElementById('cart-items');

      const cartTotal =
        document.getElementById('cart-total');

      cartItems.innerHTML = '';

      let total = 0;

      cart.forEach((item,index) => {

        total += item.price;

        cartItems.innerHTML += `

          <div class="cart-item">

            <div class="cart-info">

              <strong>${item.name}</strong>

              <p>
                $${item.price.toFixed(2)}
              </p>

            </div>

            <button
              class="trash-btn"
              onclick="removeFromCart(${index})"
            >
              🗑️
            </button>

          </div>
        `;
      });

      cartTotal.innerText =
        `$${total.toFixed(2)}`;

      document.getElementById(
        'sidebar-total'
      ).innerText =
        `$${total.toFixed(2)}`;

      localStorage.setItem(
        'restaurantCart',
        JSON.stringify(cart)
      );
    }

    // ==============================
    // REMOVE CART
    // ==============================

    function removeFromCart(index){

      cart.splice(index,1);

      renderCart();
    }

    // ==============================
    // FINISH ORDER
    // ==============================

    function finishOrder(){

      const payment =
        document.getElementById(
          'payment-method'
        ).value;

      const customerName =
        document.getElementById(
          'customer-name'
        ).value;

      const customerAddress =
        document.getElementById(
          'customer-address'
        ).value;

      const customerCity =
        document.getElementById(
          'customer-city'
        ).value;

      const customerZip =
        document.getElementById(
          'customer-zip'
        ).value;

      // EMPTY CART

      if(cart.length === 0){

        alert('Cart is empty!');

        return;
      }

      // PAYMENT

      if(payment === ''){

        alert('Select payment method!');

        return;
      }

      // ADDRESS

      if(
        customerName === '' ||
        customerAddress === '' ||
        customerCity === '' ||
        customerZip === ''
      ){

        alert(
          'Fill all address fields!'
        );

        return;
      }

      // TOTAL

      const total =
        cart.reduce(
          (sum,item) =>
            sum + item.price,
          0
        );

      // ORDER OBJECT

      const order = {

        orderNumber: orderCounter,

        customer: {

          name: customerName,

          address: customerAddress,

          city: customerCity,

          zipCode: customerZip
        },

        paymentMethod: payment,

        items: cart,

        total: total.toFixed(2),

        createdAt:
          new Date().toISOString()
      };

      // SAVE ORDER

      orders.push(order);

      localStorage.setItem(
        'restaurantOrders',
        JSON.stringify(orders)
      );

      // COUNTER

      orderCounter++;

      localStorage.setItem(
        'restaurantOrderCounter',
        orderCounter
      );

      // JSON

      console.log(
        JSON.stringify(order,null,2)
      );

      // SUCCESS

      alert(`

Order #${order.orderNumber} completed!

Total: $${total.toFixed(2)}

Payment: ${payment}

      `);

      // RESET

      cart = [];

      localStorage.removeItem(
        'restaurantCart'
      );

      renderCart();

      document.getElementById(
        'payment-method'
      ).value = '';

      document.getElementById(
        'customer-name'
      ).value = '';

      document.getElementById(
        'customer-address'
      ).value = '';

      document.getElementById(
        'customer-city'
      ).value = '';

      document.getElementById(
        'customer-zip'
      ).value = '';
    }

    // ==============================
    // INITIAL RENDER
    // ==============================

    renderCart();

  </script>
